<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>agent-view</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 fill=%22%23070a0c%22/><text x=%2232%22 y=%2244%22 font-family=%22monospace%22 font-size=%2240%22 fill=%22%236bff8f%22 text-anchor=%22middle%22>></text></svg>" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="dot" id="connDot"></span>
    <h1>Agent View</h1>
    <span id="agentCount">0 agents</span>
    <span class="sep">·</span>
    <span id="waitingCount">0 waiting</span>
  </div>
  <div class="meta">
    <label class="toggle"><input type="checkbox" id="compactToggle" /> <span class="key">[c]</span>ompact</label>
    <label class="toggle"><input type="checkbox" id="soundToggle" checked /> <span class="key">[s]</span>ound</label>
    <label class="toggle"><input type="checkbox" id="notifyToggle" /> <span class="key">[n]</span>otify</label>
    <span class="sep">·</span>
    <span class="clock" id="clock"></span>
  </div>
</header>

<main>
  <section id="agentsSection">
    <h2 class="section-title">agents</h2>
    <div id="triage" class="triage" hidden></div>
    <nav id="agentTabs" class="tabs" aria-label="agent tabs"></nav>
    <div id="agentGrid" class="grid"></div>
    <p id="emptyAgents" class="empty">// no agents yet — POST to /api/events to register</p>
    <p id="hiddenHint" class="hidden-hint" style="display:none"></p>
  </section>

  <section id="historySection">
    <div class="rowhead">
      <h2 class="section-title">history</h2>
      <button id="refreshHistory" class="ghost">[r] reload</button>
    </div>
    <table id="historyTable">
      <thead>
        <tr><th>when</th><th>agent</th><th>task</th><th>dur</th><th>tokens</th><th>result</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
</main>

<footer class="footer">
  <span id="footerStatus">ready</span>
  <span>&gt;<span class="cursor">_</span></span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module" src="/app.js"></script>
</body>
</html>
